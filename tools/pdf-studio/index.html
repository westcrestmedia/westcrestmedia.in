<body>

<!-- NAV -->
<script>
  window.__WM_TOOL__ = { slug: 'pdf-studio', name: 'PDF Studio Pro', emoji: '📑', url: '/tools/pdf-studio/' }
</script>
<script type="module" src="/assets/js/header-tool.js"></script>
<nav id="tool-nav"></nav>

<!-- APP -->
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="switchMode('build')" id="modeTab-build">Build</button>
      <button class="mode-tab" onclick="switchMode('edit')" id="modeTab-edit">Edit</button>
      <button class="mode-tab" onclick="switchMode('tools')" id="modeTab-tools">Tools</button>
    </div>
    <div class="sidebar-scroll" id="sidebarContent"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle"><span>PDF Studio Pro</span> — Select a tool to begin</div>
      <div style="display:flex;gap:8px;align-items:center;" id="topbarActions">
        <button class="btn btn-outline" id="btnPreview" onclick="doPreview()" style="display:none;">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Preview
        </button>
        <button class="btn btn-primary btn-lg" id="btnDownload" onclick="doDownload()" disabled>
          <svg id="btnDownloadIcon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span id="btnDownloadLabel">Download PDF</span>
        </button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-bar" id="statsBar" style="display:none;">
      <div class="stat"><span class="stat-label">Files</span><span class="stat-val" id="statFiles">0</span></div>
      <div class="stat"><span class="stat-label">Pages</span><span class="stat-val" id="statPages">0</span></div>
      <div class="stat"><span class="stat-label">Size</span><span class="stat-val" id="statSize">—</span></div>
      <div class="stat"><span class="stat-label">Mode</span><span class="stat-val" id="statMode">—</span></div>
    </div>

    <!-- OPTIONS -->
    <div id="optionsArea"></div>

    <!-- CANVAS -->
    <div class="canvas-area" id="canvasArea">
      <div class="empty" id="emptyState">
        <div class="empty-icon">📑</div>
        <div class="empty-title">PDF Studio Pro</div>
        <div class="empty-sub">Industry-grade PDF tools in your browser. Images, PDFs, merging, splitting, compression, watermarks — all private, all local.</div>
      </div>
    </div>
  </main>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toastWrap"></div>

<input type="file" id="fileInput" multiple accept=".pdf,image/*" style="display:none;" onchange="handleFiles(this.files)">
<input type="file" id="pdfInput" multiple accept=".pdf" style="display:none;" onchange="handlePDFFiles(this.files)">
<input type="file" id="imgInput" multiple accept="image/*" style="display:none;" onchange="handleImageFiles(this.files)">
